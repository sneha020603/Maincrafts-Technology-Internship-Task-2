<!DOCTYPE html>
<html>
<head>
    <title>Sneha | Full Stack Developer</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1> Sneha 👩‍💻</h1>
    <p>Full Stack Developer | Java + Spring Boot</p>
</header>

<section class="glass">
    <h2>📬 Contact Me</h2>

    <form action="/contact" method="post">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message"></textarea>
        <button>Submit</button>
    </form>
</section>

<section>
    <h2>📊 Live Data Dashboard</h2>

    <button onclick="loadData()">Fetch Data</button>

    <div class="table-box">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</section>

<script>
function loadData() {
    fetch('/contacts')
    .then(res => res.json())
    .then(data => {
        let table = document.querySelector("tbody");
        table.innerHTML = "";

        data.forEach(d => {
            table.innerHTML += `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.name}</td>
                    <td>${d.email}</td>
                    <td>${d.message}</td>
                </tr>
            `;
        });
    });
}
</script>

</body>
</html>
